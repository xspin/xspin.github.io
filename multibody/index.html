<!DOCTYPE HTML>
<html>
	<head>
        <title> Multi-Body </title>
        <style>
            html,body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                margin: 0;
            }
        </style>
	</head>

<body>

    <!-- <div id = "title" style="text-align: center; margin-top:40px; font-size:30px; color:gray;"> -->
    <!-- </div> -->
    <div id = "title" style="text-align: center; margin:auto; font-size:20px; color:gray;">
        <select name="dim" id="dim" onchange="init()" >
            <!--<option value="1">1</option>-->
            <option value="2">2</option>
            <option value="3" selected="selected">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="40">40</option>
            <option value="50">50</option>
        </select>
    </div>

    <!-- <div id = "canvas" style="text-align: center;  margin:auto;"> -->
        <canvas id="myCanvas" style="border:1px solid #c3c3c3; position: absolute; left:0%; top:0%; z-index: -1;">
        Your browser does not support the canvas element.
        </canvas>
    <!-- </div> -->

</body>

<script type="text/javascript"> 
    window.requestAnimationFrame = ( function() {
        return window.mozRequestAnimationFrame ||
        // window.webkitRequestAnimationFrame ||
        window.oRequestAnimationFrame ||
        window.msRequestAnimationFrame ||
        function(callback, element) {
            window.setTimeout( callback, 1000/10);
        };
    } )();
</script>
<script type="text/javascript" src="./multibody.js"> </script>

</html>
